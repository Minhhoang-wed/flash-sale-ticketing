services:
  postgres:
    image: postgres:16
    container_name: flashsale-postgres
    environment:
      POSTGRES_DB: flashsale
      POSTGRES_USER: flashsale
      POSTGRES_PASSWORD: flashsale
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashsale -d flashsale"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: flashsale-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Web UI: http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: flashsale-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/flashsale
      SPRING_DATASOURCE_USERNAME: flashsale
      SPRING_DATASOURCE_PASSWORD: flashsale
      SPRING_DATA_REDIS_HOST: redis
      SPRING_RABBITMQ_HOST: rabbitmq
      # naive | pessimistic | optimistic | redis
      RESERVE_STRATEGY: ${RESERVE_STRATEGY:-redis}
      # false = tắt consumer để demo message chờ trong queue
      CONSUMER_ENABLED: ${CONSUMER_ENABLED:-true}
      # Hạn giữ chỗ (giây) — demo unhappy path: đặt 60
      RESERVATION_TTL_SECONDS: ${RESERVATION_TTL_SECONDS:-600}
      EXPIRE_SCAN_MS: ${EXPIRE_SCAN_MS:-30000}
    ports:
      - "8080:8080"

volumes:
  pgdata:
